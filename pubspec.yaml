name: lumio
description: "Aplicativo de gestão financeira e controle de produtos para vendedores"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.5.0
  google_sign_in: ^7.1.1

  # Hive
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gráficos
  fl_chart: ^0.69.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Ícone do app
  flutter_launcher_icons: ^0.13.1

  # Geração de código Hive
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # Lints
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_icons:
  android: true
  ios: true
  image_path: assets/icon.png